name: flutter_tv_app
description: ClearCast — curated web on TV & desktop with WebView and Sheets URLs.
version: 1.0.1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView with full request interception
  flutter_inappwebview: ^6.1.5

  # HTTP for fetching Google Sheets CSV
  http: ^1.2.1

  # Cached images for thumbnails
  cached_network_image: ^3.3.1

  # URL launcher fallback
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  pub_semver: ^2.1.4
  open_file: ^3.3.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path_android: assets/branding/clearcast_logo.png
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/clearcast_logo.png
  macos:
    generate: true
    image_path: assets/branding/clearcast_logo.png
  windows:
    generate: true
    image_path: assets/branding/clearcast_logo.png
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/blocklist.txt
    - assets/branding/clearcast_logo.png
