name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      # GitHub does not allow `secrets` in `if:` — gate with a repo variable instead.
      # Settings → Secrets and variables → Actions → Variables:
      #   ANDROID_SIGNING_ENABLED = true
      - name: Sign APK
        id: sign_android
        if: ${{ vars.ANDROID_SIGNING_ENABLED == 'true' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: build/app/outputs/flutter-apk
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Normalize APK output path
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ steps.sign_android.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_android.outputs.signedReleaseFile }}" dist/clearcast-${{ github.ref_name }}-android.apk
          else
            cp build/app/outputs/flutter-apk/app-release.apk dist/clearcast-${{ github.ref_name }}-android.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: dist/clearcast-${{ github.ref_name }}-android.apk

  release:
    needs: [build-android]
    runs-on: ubuntu-latest

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apk/clearcast-${{ github.ref_name }}-android.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
